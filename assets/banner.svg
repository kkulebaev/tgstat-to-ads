<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="TGStat → Telegram Ads">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1200" height="300" fill="#0b1020"/>
  <rect x="40" y="40" width="1120" height="220" rx="28" fill="url(#g)" filter="url(#shadow)" opacity="0.95"/>

  <g fill="#ffffff">
    <text x="600" y="145" text-anchor="middle" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="64" font-weight="800" letter-spacing="0.5">
      TGStat → Telegram Ads
    </text>
    <text x="600" y="205" text-anchor="middle" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial" font-size="26" font-weight="600" opacity="0.9">
      Weekly channel stats post (image + caption + CTA button)
    </text>
  </g>
</svg>
